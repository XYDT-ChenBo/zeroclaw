# Example Config

# ── Delegate Tool Configuration ─────────────────────────────────
# Global default timeouts for the delegate tool.
# These can be overridden per-agent in [agents.<name>] sections.
[delegate]
# Timeout in seconds for non-agentic sub-agent provider calls.
# Default: 120
timeout_secs = 120

# Timeout in seconds for agentic sub-agent runs (multi-turn tool loops).
# Default: 300
agentic_timeout_secs = 300

# ── Delegate Agent Configuration ────────────────────────────────
# Define individual sub-agents that can be invoked via the delegate tool.
# Each agent can override the global timeout values.
[agents.researcher]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You are a research assistant."
temperature = 0.3
max_depth = 3
agentic = false
max_iterations = 10
# Optional: override global defaults
timeout_secs = 120
agentic_timeout_secs = 300

[agents.coder]
provider = "ollama"
model = "codellama"
system_prompt = "You are a coding assistant."
temperature = 0.2
max_depth = 2
agentic = true
allowed_tools = ["read", "edit", "exec"]
max_iterations = 15
# Optional: use longer timeout for complex coding tasks
agentic_timeout_secs = 600

# ── Cron Configuration ────────────────────────────────────────
[cron]
# Enable the cron subsystem. Default: true
enabled = true
# Run all overdue jobs at scheduler startup. Default: true
catch_up_on_startup = true
# Maximum number of historical cron run records to retain. Default: 50
max_run_history = 50

# ── Declarative Cron Jobs ─────────────────────────────────────
# Define cron jobs directly in config. These are synced to the database
# at scheduler startup. Each job needs a stable `id` for merge semantics.

# Shell job: runs a shell command on a cron schedule
[[cron.jobs]]
id = "daily-backup"
name = "Daily Backup"
job_type = "shell"
command = "tar czf /tmp/backup.tar.gz /data"
schedule = { kind = "cron", expr = "0 2 * * *" }

# Agent job: runs an agent prompt on an interval
[[cron.jobs]]
id = "health-check"
name = "Health Check"
job_type = "agent"
prompt = "Check server health: disk space, memory, CPU load"
model = "anthropic/claude-sonnet-4"
allowed_tools = ["shell", "file_read"]
schedule = { kind = "every", every_ms = 300000 }

# Cron job with timezone and delivery
# [[cron.jobs]]
# id = "morning-report"
# name = "Morning Report"
# job_type = "agent"
# prompt = "Generate a daily summary of system metrics"
# schedule = { kind = "cron", expr = "0 9 * * 1-5", tz = "America/New_York" }
# [cron.jobs.delivery]
# mode = "announce"
# channel = "telegram"
# to = "123456789"

# ── Cron HTTP Delivery Configuration ───────────────────────────
# Enables delivery target channel = "http" or "app_display".
[cron_http_delivery]
# Enable HTTP delivery route for cron announcements. Default: false
enabled = false
# Full HTTP endpoint (e.g. "http://127.0.0.1:8080/v1/display")
endpoint = ""
# Optional bearer token for Authorization header
token = ""
# Request timeout in seconds. Default: 10
timeout_secs = 10
# Retry count after first attempt. Default: 1
retry_count = 1
# Backoff between retries in milliseconds. Default: 500
retry_backoff_ms = 500
# Optional extra headers
# headers = { "X-App-Id" = "zeroclaw" }


[gateway.a2a]
enabled = false
stream_enabled = true
auth_enabled = false

[gateway]
# 当打开时：在 `POST /response` 的 SSE 流式输出中，
# `is_thinking=true` 阶段只保留“阶段进度(🤔 ...)”和“工具调用进度(⏳/✅/❌ ...)”，
# 过滤掉纯文本思考过程。
hide_pure_thinking_text = false
